  <rect x="28" y="40" width="6" height="20" rx="3" fill="#0A0808"/>
  <rect x="66" y="40" width="6" height="20" rx="3" fill="#0A0808"/>
  <!-- Intense focused eyes - slightly squinted -->
  <path d="M35 50 Q41 47 47 50 Q41 53 35 50Z" fill="#1A0A08"/>
  <ellipse cx="41" cy="50" rx="5" ry="2.5" fill="white"/>
