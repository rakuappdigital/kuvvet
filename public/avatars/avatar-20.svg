  <path d="M35 49 Q41 46 47 49" stroke="#1A0808" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M53 50 Q59 47 65 50 Q59 53 53 50Z" fill="#1A0A08"/>
  <ellipse cx="59" cy="50" rx="5" ry="2.5" fill="white"/>
  <circle cx="59" cy="50" r="2" fill="#0A0808"/>
  <path d="M53 49 Q59 46 65 49" stroke="#1A0808" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Strong eyebrows -->
  <path d="M34 47 Q41 43 47 47" stroke="#0A0808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M53 47 Q59 43 65 47" stroke="#0A0808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose - strong -->
  <path d="M47 55 L45 60 L47 62 L50 60 L53 62 L55 60 L53 55" fill="#A87048"/>
