<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Darth Vader -->
  <rect width="100" height="100" fill="#000000"/>
  <!-- Cape/chest -->
  <path d="M10 100 L20 65 L50 72 L80 65 L90 100Z" fill="#080808"/>
  <!-- Helmet dome -->
  <path d="M18 52 Q18 20 50 16 Q82 20 82 52Z" fill="#1A1A1A"/>
  <!-- Helmet dome highlight -->
  <path d="M22 48 Q22 24 50 20 Q72 24 76 40" stroke="#303030" stroke-width="2" fill="none"/>
  <!-- Faceplate -->
  <path d="M20 52 L24 68 Q50 76 76 68 L80 52 L72 55 Q50 60 28 55Z" fill="#141414"/>
  <!-- Faceplate center ridge -->
  <rect x="47" y="52" width="6" height="18" rx="2" fill="#0A0A0A"/>
  <!-- Breathing grilles - left -->
  <rect x="28" y="58" width="14" height="3" rx="1" fill="#0A0A0A"/>
  <rect x="28" y="62" width="14" height="3" rx="1" fill="#0A0A0A"/>
  <rect x="28" y="66" width="14" height="3" rx="1" fill="#0A0A0A"/>
  <!-- Breathing grilles - right -->
  <rect x="58" y="58" width="14" height="3" rx="1" fill="#0A0A0A"/>
  <rect x="58" y="62" width="14" height="3" rx="1" fill="#0A0A0A"/>
  <rect x="58" y="66" width="14" height="3" rx="1" fill="#0A0A0A"/>
  <!-- Red eye lenses -->
  <ellipse cx="38" cy="44" rx="9" ry="6" fill="#2A0000"/>
  <ellipse cx="62" cy="44" rx="9" ry="6" fill="#2A0000"/>
  <ellipse cx="38" cy="44" rx="7" ry="4.5" fill="#CC0000" opacity="0.6"/>
  <ellipse cx="62" cy="44" rx="7" ry="4.5" fill="#CC0000" opacity="0.6"/>
  <!-- Lightsaber red glow at bottom -->
  <rect x="46" y="88" width="8" height="12" rx="2" fill="#CC0000" opacity="0.8"/>
  <rect x="44" y="86" width="12" height="4" rx="2" fill="#FF2020" opacity="0.4"/>
</svg>
