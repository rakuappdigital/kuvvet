<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Einstein -->
  <rect width="100" height="100" fill="#1E1A14"/>
  <path d="M22 100 L30 76 Q50 84 70 76 L78 100Z" fill="#2A2420"/>
  <!-- Wild white hair - left puff -->
  <ellipse cx="22" cy="42" rx="16" ry="22" fill="#E8E4DC"/>
  <!-- Wild white hair - right puff -->
  <ellipse cx="78" cy="42" rx="16" ry="22" fill="#E8E4DC"/>
  <!-- Hair top - wild strands -->
  <path d="M28 30 Q32 14 38 20 Q42 8 48 18 Q50 6 52 18 Q58 8 62 20 Q68 14 72 30" fill="#E8E4DC"/>
  <!-- Face -->
  <ellipse cx="50" cy="55" rx="20" ry="22" fill="#E0C090"/>
