  <path d="M30 36 Q50 28 70 36" fill="#E8E4DC"/>
  <!-- Eyebrows - bushy white -->
  <path d="M36 46 Q42 43 48 46" stroke="#D8D4CC" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M52 46 Q58 43 64 46" stroke="#D8D4CC" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="42" cy="51" rx="4.5" ry="3" fill="white"/>
  <circle cx="42" cy="51" r="2" fill="#2A1808"/>
  <ellipse cx="58" cy="51" rx="4.5" ry="3" fill="white"/>
  <circle cx="58" cy="51" r="2" fill="#2A1808"/>
  <!-- Mustache - large gray -->
  <path d="M40 62 Q50 68 60 62" fill="#B0A898"/>
  <path d="M40 62 Q50 65 60 62" fill="#C8C0B0"/>
  <!-- Nose -->
