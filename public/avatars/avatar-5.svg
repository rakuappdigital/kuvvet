<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Che Guevara -->
  <rect width="100" height="100" fill="#280808"/>
  <path d="M20 100 L30 74 Q50 82 70 74 L80 100Z" fill="#1A3018"/>
  <!-- Beret -->
  <ellipse cx="50" cy="32" rx="28" ry="14" fill="#0A0A0A"/>
  <path d="M22 32 Q50 22 78 32 Q78 24 50 18 Q22 24 22 32Z" fill="#141414"/>
  <!-- Beret flap/band -->
  <rect x="22" y="32" width="56" height="5" rx="2" fill="#181818"/>
  <!-- Star on beret -->
  <polygon points="50,22 52,28 58,28 53,32 55,38 50,34 45,38 47,32 42,28 48,28" fill="#C8A020"/>
  <!-- Hair showing under beret -->
  <path d="M22 36 Q18 44 22 52" stroke="#0A0A0A" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M78 36 Q82 44 78 52" stroke="#0A0A0A" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Face -->
  <ellipse cx="50" cy="57" rx="18" ry="20" fill="#B07840"/>
  <!-- Beard -->
  <path d="M32 62 Q34 80 50 84 Q66 80 68 62 L64 68 Q50 78 36 68Z" fill="#1A1008"/>
  <!-- Mustache -->
  <path d="M40 62 Q50 66 60 62" fill="#1A1008"/>
  <!-- Eyes -->
  <ellipse cx="42" cy="52" rx="4" ry="2.8" fill="white"/>
  <circle cx="42" cy="52" r="2" fill="#1A0A08"/>
  <ellipse cx="58" cy="52" rx="4" ry="2.8" fill="white"/>
  <circle cx="58" cy="52" r="2" fill="#1A0A08"/>
  <!-- Nose -->
  <path d="M47 57 L45 62 L47 63 L50 61 L53 63 L55 62 L53 57" fill="#9A6030"/>
</svg>
