<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Joker -->
  <rect width="100" height="100" fill="#14082A"/>
  <path d="M20 100 L28 72 Q50 80 72 72 L80 100Z" fill="#5A1060"/>
  <!-- Purple coat -->
  <path d="M28 70 L34 60 L42 68 L50 64 L58 68 L66 60 L72 70Z" fill="#5A1060"/>
  <!-- Green hair - wild spiky -->
  <path d="M26 44 L20 22 L30 36 L28 18 L36 32 L38 14 L44 30 L46 12 L50 28 L54 12 L56 30 L62 14 L64 32 L72 18 L70 36 L80 22 L74 44" fill="#1A6820"/>
  <!-- Dark eye makeup areas -->
  <ellipse cx="40" cy="50" rx="10" ry="8" fill="#1A0A28" opacity="0.8"/>
  <ellipse cx="60" cy="50" rx="10" ry="8" fill="#1A0A28" opacity="0.8"/>
  <!-- White painted face -->
  <ellipse cx="50" cy="54" rx="20" ry="22" fill="#F0F0E0"/>
  <!-- Dark eye makeup on face -->
  <ellipse cx="40" cy="50" rx="8" ry="6" fill="#2A1040" opacity="0.5"/>
  <ellipse cx="60" cy="50" rx="8" ry="6" fill="#2A1040" opacity="0.5"/>
  <!-- Eyes -->
  <ellipse cx="40" cy="50" rx="5" ry="3.5" fill="white"/>
  <circle cx="40" cy="50" r="2.5" fill="#1A0828"/>
  <ellipse cx="60" cy="50" rx="5" ry="3.5" fill="white"/>
  <circle cx="60" cy="50" r="2.5" fill="#1A0828"/>
  <!-- Nose - red ball -->
  <ellipse cx="50" cy="57" rx="3" ry="2.5" fill="#CC2020"/>
  <!-- Glasgow smile - wide red grin -->
  <path d="M30 64 Q50 78 70 64" fill="#CC1010"/>
  <path d="M32 64 Q50 75 68 64" fill="#E82020"/>
  <!-- Teeth -->
  <path d="M38 66 Q50 72 62 66 L60 68 Q50 74 40 68Z" fill="white"/>
  <!-- Smile line cuts -->
  <line x1="30" y1="64" x2="36" y2="58" stroke="#AA0808" stroke-width="1.5"/>
  <line x1="70" y1="64" x2="64" y2="58" stroke="#AA0808" stroke-width="1.5"/>
</svg>
