<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wonder Woman -->
  <rect width="100" height="100" fill="#0A1428"/>
  <path d="M20 100 L28 70 Q50 80 72 70 L80 100Z" fill="#CC1820"/>
  <!-- Red/gold armor bodice -->
  <path d="M28 68 L34 58 L40 64 L50 60 L60 64 L66 58 L72 68Z" fill="#CC1820"/>
  <!-- Gold W emblem -->
  <path d="M38 62 L42 56 L46 62 L50 56 L54 62 L58 56 L62 62" stroke="#D4A020" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Long black hair - left -->
  <path d="M24 44 Q20 60 22 80 Q26 72 28 60 Q30 52 30 44" fill="#0A0808"/>
  <!-- Long black hair - right -->
  <path d="M76 44 Q80 60 78 80 Q74 72 72 60 Q70 52 70 44" fill="#0A0808"/>
  <!-- Hair top -->
  <path d="M28 38 Q50 28 72 38 L70 44 Q50 34 30 44Z" fill="#0A0808"/>
  <!-- Face -->
  <ellipse cx="50" cy="52" rx="19" ry="20" fill="#C8906A"/>
  <!-- Gold tiara -->
  <path d="M32 38 L68 38 L66 42 L50 40 L34 42Z" fill="#D4A020"/>
  <!-- Red star on tiara -->
  <polygon points="50,36 51.5,39.5 55,39.5 52.5,41.5 53.5,45 50,43 46.5,45 47.5,41.5 45,39.5 48.5,39.5" fill="#CC1820"/>
  <!-- Eyes - blue/striking -->
  <ellipse cx="41" cy="50" rx="5" ry="3" fill="white"/>
  <circle cx="41" cy="50" r="2.2" fill="#2040A0"/>
  <ellipse cx="59" cy="50" rx="5" ry="3" fill="white"/>
  <circle cx="59" cy="50" r="2.2" fill="#2040A0"/>
  <!-- Strong eyebrows -->
  <path d="M36 47 Q41 44 46 47" stroke="#0A0808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M54 47 Q59 44 64 47" stroke="#0A0808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M47 55 Q46 60 48 61 L52 61 Q54 60 53 55" stroke="#9A6040" stroke-width="1.2" fill="none"/>
  <!-- Confident lips -->
  <path d="M42 64 Q50 68 58 64" fill="#CC3030"/>
  <path d="M43 63 Q50 66 57 63" fill="#E84040"/>
</svg>
