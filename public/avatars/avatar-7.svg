<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Atatürk -->
  <rect width="100" height="100" fill="#2E0A14"/>
  <path d="M20 100 L28 72 Q50 80 72 72 L80 100Z" fill="#1A1A2A"/>
  <!-- Suit jacket -->
  <path d="M28 72 L32 62 L38 70 L50 66 L62 70 L68 62 L72 72Z" fill="#1A1A2A"/>
  <!-- White shirt/collar -->
  <path d="M44 66 L50 60 L56 66 L50 68Z" fill="#F0EDE8"/>
  <!-- Dark tie -->
  <path d="M48 64 L50 60 L52 64 L50 76Z" fill="#0A0A18"/>
  <!-- Hair - neat, dark, side parted -->
  <path d="M28 38 Q50 24 72 38 L72 32 Q50 16 28 32Z" fill="#0A0808"/>
  <path d="M28 32 Q50 22 72 32 L70 36 Q52 27 30 36Z" fill="#141010"/>
  <!-- Face -->
  <ellipse cx="50" cy="54" rx="19" ry="21" fill="#DEB090"/>
  <!-- Side hair -->
  <rect x="28" y="35" width="6" height="22" rx="3" fill="#0A0808"/>
  <rect x="66" y="35" width="6" height="22" rx="3" fill="#0A0808"/>
  <!-- Eyebrows - strong -->
  <path d="M37 46 Q43 43 48 46" stroke="#0A0808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M52 46 Q57 43 63 46" stroke="#0A0808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes - light blue/gray - distinctive feature -->
  <ellipse cx="42" cy="51" rx="5" ry="3" fill="white"/>
  <circle cx="42" cy="51" r="2" fill="#5080A0"/>
  <ellipse cx="58" cy="51" rx="5" ry="3" fill="white"/>
  <circle cx="58" cy="51" r="2" fill="#5080A0"/>
  <!-- Strong nose -->
  <path d="M48 56 L46 62 L48 64 L50 62 L52 64 L54 62 L52 56" fill="#C09070"/>
  <!-- Lips - firm -->
  <path d="M44 67 L50 70 L56 67" stroke="#A06840" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
